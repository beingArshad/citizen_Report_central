<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Government Officer Registration</title>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #e3f2fd, #ffffff);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.form-card{
    background:#ffffff;
    width:820px;
    max-width:980px;
    padding:30px 40px;
    border-radius:14px;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h2{
    margin:0;
    color:#0d47a1;
}

.header p{
    margin:5px 0 0;
    color:#555;
    font-size:14px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px 20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    font-size:13px;
    margin-bottom:5px;
    color:#333;
}

.form-group input,
.form-group select{
    padding:10px 12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:14px;
    outline:none;
}

.form-group input:focus,
.form-group select:focus{
    border-color:#0d47a1;
}

.full-width{
    grid-column:1 / -1;
}

.btn-area{
    text-align:center;
    margin-top:20px;
}

button{
    background:#0d47a1;
    color:#fff;
    border:none;
    padding:12px 40px;
    font-size:15px;
    border-radius:25px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#08306b;
}
/* Responsive: tablet and mobile */
@media (max-width: 992px) {
    .form-card { width: calc(100% - 80px); padding: 24px 28px; }
    .form-grid { gap: 14px 16px; }
}

@media (max-width: 768px) {
    body { padding: 24px 12px; }
    .form-card { width: 100%; max-width: 720px; padding: 20px; border-radius:12px; }
    .form-grid { grid-template-columns: 1fr; gap: 12px 0; }
    .full-width { grid-column: auto; }
    .btn-area { margin-top: 16px; }
    button { width: 100%; padding: 12px; }
}

@media (max-width: 420px) {
    .form-card { padding: 16px; border-radius:10px; }
    .form-group label { font-size: 13px; }
    .form-group input, .form-group select { font-size: 14px; padding: 10px; }
    .header h2 { font-size: 20px; }
}
</style>
</head>

<body>

<div class="form-card">
    <div class="header">
        <h2>Government Officer Registration</h2>
        <p>Please fill in your official details</p>
    </div>

    <form>
        <div class="form-grid">
            <div class="form-group">
                <label>Officer Name</label>
                <input type="text" placeholder="Enter full name" required>
            </div>

            <div class="form-group">
                <label>Employee ID</label>
                <input type="text" placeholder="Enter employee ID" required>
            </div>

            <div class="form-group">
                <label>Department</label>
                <select required>
                    <option value="">Select department</option>
                    <option>Water department</option>
                    <option>Road department</option>
                    <option>Health department</option>
                    <option>Electricity department</option>
                    <option>Sanitation department</option>
                    <option>Education department</option>
                    <option>Transport department</option>
                    <option>lrrigation department</option>
                </select>
            </div>

            <div class="form-group">
                <label>Designation</label>
                <input type="text" placeholder="Enter designation" required>
            </div>

            <div class="form-group">
                <label>Official Email</label>
                <input type="email" placeholder="Enter official email" required>
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" placeholder="Enter mobile number" required>
            </div>

            <div class="form-group">
                <label>Office Location</label>
                <input type="text" placeholder="Enter office location" required>
            </div>

            <div class="form-group">
                <label>District</label>
                <input type="text" placeholder="Enter district" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Create password" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm password" required>
            </div>
        </div>

        <div class="btn-area">
            <button type="submit">Register Officer</button>
        </div>
        <p style="text-align: center;">
    Already have an account?
    <a href="/Rural Governance_1/Rural Governance/Best one(1)/admin_dashboard/login.html">Login</a>
</p>
    </form>
</div>

</body>
</html>
