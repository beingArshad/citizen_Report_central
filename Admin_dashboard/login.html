<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira:wght@100..900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:'Saira',sans-serif}
body{margin:0;min-height:100vh;display:flex;}
.container{width:100%;display:flex;min-height:100vh}
a{text-decoration:none;color:white}
/* LEFT SIDE */
.left{width:50%;background:#3b8dbd;color:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;padding:40px}
.left h1{font-size:42px;margin-bottom:10px;line-height:1.05;text-align:center}
.left p{font-size:16px;opacity:0.95;text-align:center}
/* Decorative shapes */
.circle{position:absolute;width:120px;height:120px;background:white;border-radius:50%;top:40px;left:40px;opacity:0.2}
.dot-box{position:absolute;width:70px;height:70px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;top:120px;left:80px}
.dot-box span{width:8px;height:8px;background:white;border-radius:50%;opacity:0.6}
.shape1{position:absolute;width:20px;height:80px;background:white;border-radius:20px;top:80px;right:120px;opacity:0.3}
.shape2{position:absolute;width:20px;height:60px;background:white;border-radius:20px;top:110px;right:80px;opacity:0.2}
.circle-bottom{position:absolute;width:100px;height:100px;background:white;border-radius:50%;bottom:40px;right:60px;opacity:0.2}
/* RIGHT SIDE */
.right{width:50%;background:#fff;display:flex;justify-content:center;align-items:center;padding:40px}
.login-card{width:360px;max-width:100%}
.logo{text-align:center;margin-bottom:10px;margin-top:30px}
.login-card h2{text-align:center;margin-bottom:20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:14px;margin-bottom:6px}
.input-box{position:relative}
.input-box input{width:100%;padding:12px 12px 12px 12px;border:1px solid #ccc;border-radius:6px;outline:none}
.options{display:flex;justify-content:space-between;font-size:13px;margin-bottom:20px}
.options a{color:#3b8dbd;text-decoration:none}
button{width:100%;padding:12px;background:#3b8dbd;border:none;color:white;font-size:16px;border-radius:6px;cursor:pointer}
.or{text-align:center;margin:20px 0;color:#aaa;position:relative}
.or::before,.or::after{content:"";position:absolute;top:50%;width:40%;height:1px;background:#ddd}
.or::before{left:0}.or::after{right:0}
.socials{display:flex;justify-content:center;gap:15px}
.socials div{width:45px;height:45px;border-radius:50%;background:#eee;display:flex;justify-content:center;align-items:center;font-weight:bold;cursor:pointer}
.footer-text{text-align:center;margin-top:20px;font-size:14px;margin-bottom:20px}
.footer-text a{color:#3b8dbd;text-decoration:none}

/* Responsive rules */
@media (max-width: 992px){
  .left{padding:32px}
  .right{padding:32px}
  .login-card{width:320px}
  .left h1{font-size:36px}
}
@media (max-width: 768px){
  .container{flex-direction:column}
  .left,.right{width:100%;padding:28px}
  .left{order:1}
  .right{order:2}
  .left h1{font-size:28px}
  .left p{font-size:14px}
  .circle{width:90px;height:90px;top:20px;left:16px}
  .dot-box{top:100px;left:20px}
  .shape1,.shape2{display:none}
  .circle-bottom{width:80px;height:80px;right:20px;bottom:20px}
  .login-card{width:100%;max-width:460px;padding:20px}
  .input-box input{padding:12px}
  .socials div{width:40px;height:40px}
}
@media (max-width:420px){
  .left{padding:20px}
  .right{padding:20px}
  .left h1{font-size:22px}
  .login-card{padding:16px}
  button{padding:12px;font-size:15px}
}
</style>
</head>

<body>


<div class="container">

    <!-- LEFT PANEL -->
    <div class="left">
        <div class="circle"></div>

        <div class="dot-box">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
        </div>

        <div class="shape1"></div>
        <div class="shape2"></div>
        <div class="circle-bottom"></div>

        <h1>Welcome your<br>Website</h1>
        <p>Create an account to Join Our Community</p>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right">
        <div class="login-card">

            <div class="logo">
                <img src="../assets/finallogo.png" alt="Rural Governance Logo" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(59,141,189,0.4);">
            </div>

            <h2>Hello! Welcome Back</h2>
        
  <div class="role-buttons">
    
   
  </div>
            <div class="field">
            <label style="font-size: 18px;">Email :</label>
            <div class="input-box">
            
     <input type="email" placeholder="Enter your Email" id="email">
                </div>
            </div>

            <div class="field">
                <label style="font-size: 18px;">Password :</label>
                <div class="input-box">
                    <input type="password" placeholder="Enter your Password" id="password">
                </div>
            </div>

            <div class="options">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forget Password?</a>
            </div>

            <button onclick="login()" >Login</button>

            <div class="or">or</div>

            <div class="socials">
                <div>G</div>
                <div>f</div>
                <div>.in</div>
            </div>

            <div class="footer-text">
                Don’t have your account? <a href="/Rural Governance_1/Rural Governance/officer.dash-board/citizen/officer/buttuns.html">create account</a>
            </div>

        </div>
    </div>

</div>

</body>

</html>
