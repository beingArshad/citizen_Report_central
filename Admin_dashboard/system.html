<style>
:root{
  --blue:#0a6cff;
  --dark-blue:#0056cc;
  --black:#0f172a;
  --bg:#f4f6fb;
  --white:#fff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, Arial, sans-serif;
}

body{
  background:var(--bg);
}

/* ===== MENU TOGGLE ===== */
#menu-toggle{display:none;}

/* ☰ MENU BUTTON */
.menu-btn{
  display:none;
  background: var(--white);
  color: var(--black);
  padding:8px 12px;
  font-size:18px;
  cursor:pointer;
  border-radius:6px;
}

  /* ===== SIDEBAR ===== */
.sidebar{
  position:fixed;
  top:var(--nav-height);
  left:0;
  width:240px;
  height:calc(100vh - var(--nav-height));
  background:var(--black);
  color:white;
  padding:25px 20px;
  z-index:2000;
  overflow-y:auto;
  transition:0.3s ease;
  min-height: 100vh;
}

.sidebar::-webkit-scrollbar{
  width:6px;
}
.sidebar::-webkit-scrollbar-thumb{
  background:#555;
  border-radius:10px;
}

.sidebar-close{
  display:none;
  position:absolute;
  top:20px;
  right:20px;
  font-size:20px;
  cursor:pointer;
  color:white;
  background:rgba(255,255,255,0.15);
  padding:6px 10px;
  border-radius:6px;
}

.sidebar a{
  display:flex;
  align-items:center;
  gap:12px;
  color:white;
  text-decoration:none;
  padding:12px;
  border-radius:8px;
  margin-bottom:12px;
  transition:0.3s;
}

.sidebar a:hover{
  background:var(--blue);
  transform:translateX(6px);
}

.login_btn{
  padding:10px 18px;
  border-radius:80px;
  border:1px solid black;
  background:transparent;
  cursor:pointer;
}

.login_btn:hover{
  background:var(--blue);
}

.login_anchor{
  text-decoration:none;
  color:black;
}

.login_btn:hover .login_anchor{
  color:white;
}
/* ===== MAIN ===== */
.main{
  margin-left:260px;
  margin-top: 50px;
  padding:35px;
  transition:0.3s;
}

/* Header */
.main-header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:20px;
}

.main-header a.back-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--blue);
  color:white;
  padding:6px 12px;
  border-radius:6px;
  text-decoration:none;
  font-size:16px;
}

.main-header a.back-btn:hover{
  background: var(--dark-blue);
}

.main-header .menu-btn{
  position:static;
  top:auto;
  left:auto;
  padding:8px 12px;
  font-size:18px;
}

.main h1{
  margin:0;
}

/* ===== SYSTEM STATUS GRID ===== */
.status-grid{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-top: 25px;
}

.status-box{
  background: var(--white);
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  text-align: center;
  transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
  cursor: default;
}

.status-box .icon{
  font-size: 32px;
  display: block;
  margin-bottom: 12px;
}

.status-box h3{
  margin-bottom: 8px;
  color: var(--black);
  font-size: 18px;
}

.status-box p{
  font-size: 16px;
  color: var(--black);
}

/* HOVER ANIMATION */
.status-box:hover{
  transform: translateY(-8px) scale(1.05);
  box-shadow: 0 15px 35px rgba(0,0,0,0.15);
  background: #e6f0ff;
}

/* ALL BOXES BLUE ACCENT */
.status-box.server,
.status-box.backup,
.status-box.version,
.status-box.security{
  border-top:4px solid var(--blue);
}

/* ===== MOBILE ===== */
@media(max-width:900px){
  .sidebar{left:-100%;}
  #menu-toggle:checked ~ .sidebar{left:0;}
  #menu-toggle:not(:checked) ~ .main .menu-btn{display:block;}
  #menu-toggle:checked ~ .main .menu-btn{display:none;}
  #menu-toggle:checked ~ .sidebar .sidebar-close{display:block;}
  .main{margin-left:0;padding:20px;}
}

footer {
     background: var(--black);
      color: white;
      padding: 40px;
      text-align: center;
      margin-top: 300px;
      
    }

    footer .logos {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    footer .logos .list {
      list-style: none;
    }

    footer .logos .links {
      width: 60px;
      height: 60px;
      background-color: #fff;
      text-align: center;
      line-height: 60px;
      font-size: 24px;
      display: block;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      border: 3px solid #fff;
      z-index: 1;
      transition: transform 0.3s;
    }

    footer .logos .links .icon {
      position: relative;
      color: #262626;
      transition: .5s;
      z-index: 3;
    }

    footer .logos .links:hover .icon {
      color: #fff;
      transform: rotateY(360deg);
    }

    footer .logos .links:before {
      content: "";
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      height: 100%;
      transition: .5s;
      z-index: 2;
    }

    footer .logos .links:hover:before {
      top: 0;
    }

    footer .logos .list:nth-child(1) .links:before {
      background: #3b5999; /* Facebook */
    }

    footer .logos .list:nth-child(2) .links:before {
      background: #E4405F; /* Instagram */
    }

    footer .logos .list:nth-child(3) .links:before {
      background: #55acee; /* Twitter */
    }
     footer .logos .list:nth-child(4) .links:before {
      background: #55acee; /* Twitter */
    }
/* ===== NAVBAR (FIXED) ===== */
nav{
  position:fixed;

nav ul li a{

nav ul li a:hover{

}

/* HIDE NAVBAR LINKS ON MOBILE */

    display: none;
  }

.main{

@media(max-width:900px){
  .sidebar{
    left:-100%;
    width:240px;
  }
  #menu-toggle:checked ~ .sidebar{
    left:0;
  }
  #menu-toggle:not(:checked) ~ .main .menu-btn{
    display:block;
  }
  #menu-toggle:checked ~ .main .menu-btn{
    display:none;
  }
  .main{
    margin-left:0;

  }
}
/* ===== MOBILE ===== */
@media(max-width:900px){
  /* Hide navbar links */
  nav ul {
    display: none;
  }

  /* Sidebar hidden by default */
  .sidebar {
    left: -240px;
    width: 240px;
    transition: 0.3s ease;
  }

  /* Sidebar visible when toggle checked */
  #menu-toggle:checked ~ .sidebar {
    left: 0;
  }

  /* Show menu button */
  #menu-toggle:not(:checked) ~ .main .menu-btn {
    display: block;
  }
  #menu-toggle:checked ~ .main .menu-btn {
    display: none;
  }

  /* Shift main content when sidebar is open */
  #menu-toggle:checked ~ .main {
    margin-left: 240px;
    transition: margin-left 0.3s ease;
  }

  /* Main default for mobile */
  .main {
    margin-left: 0;
    padding: 20px;
    transition: margin-left 0.3s ease;
  }
}
