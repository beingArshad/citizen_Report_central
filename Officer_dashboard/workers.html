<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/workers.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="top-bar">
        <div class="logo">
            <img src="../assets/finallogo.png" alt="Rural Governance Logo" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(102,126,234,0.4);">
        </div>

        <button class="hamburger toggle-btn" onclick="toggleNav()">
            <i class="fa-solid fa-bars"></i>
        </button>

        <ul class="nav-links" id="navLinks">
            <span class="close-nav" onclick="toggleNav()">&times;</span>

            <li><a href="home.html"><i class="fa-solid fa-house"></i> Home</a></li>
            <li><a href="complaints.html" class="active"><i class="fa-solid fa-file-lines"></i> Complaints</a></li>
            <li><a href="workers.html"><i class="fa-solid fa-person-digging"></i> Workers</a></li>
            <li><a href="analysis.html"><i class="fa-solid fa-chart-column"></i>Analysis</a></li>
            <li><a href="profile.html"><i class="fa-regular fa-address-card"></i> Profile</a></li>
        </ul>
    </div>
    <div class="container">
        <h1>Manage Workers</h1>

        <div class="card">
            <div class="toolbar">
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" class="search-input"
                        placeholder="Search by name, trade, or location..." onkeyup="searchWorkers()">
                </div>
                <button class="btn btn-primary" onclick="openAddModal()">+ Add Worker</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name & Trade</th>
                            <th>Email</th>
                            <th>Contact No</th>
                            <th>Location</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="workers-tbody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addModal">
        <div class="modal-content">
            <h2>Add New Worker</h2>

            <div class="form-group">
                <label class="form-label">Full Name & Trade</label>
                <input type="text" id="add-name" class="form-control" placeholder="e.g. Suresh (Mason)">
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="add-email" class="form-control" placeholder="e.g. suresh@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">Contact No</label>
                <input type="text" id="add-contact" class="form-control" placeholder="e.g. 9876543210">
            </div>
            <div class="form-group">
                <label class="form-label">Location (Coming From)</label>
                <input type="text" id="add-location" class="form-control" placeholder="e.g. Ward 1, North Block">
            </div>

            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('addModal')">Cancel</button>
                <button class="btn btn-success" onclick="saveNewWorker()">Save Worker</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="updateModal">
        <div class="modal-content">
            <h2>Update Worker Details</h2>

            <div class="form-group">
                <label class="form-label">Worker Name</label>
                <div id="update-name-display" class="readonly-text"></div>
                <input type="hidden" id="update-id">
            </div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="update-email" class="form-control">
            </div>
            <div class="form-group">
                <label class="form-label">Contact No</label>
                <input type="text" id="update-contact" class="form-control">
            </div>
            <div class="form-group">
                <label class="form-label">Location (Coming From)</label>
                <input type="text" id="update-location" class="form-control">
            </div>

            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('updateModal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveUpdatedWorker()">Update Details</button>
            </div>
        </div>
    </div>

    <script>

        document.querySelector('.toggle-btn').addEventListener('click', function () {
            document.querySelector('.nav-links').classList.toggle('active');
        });

        // --- 1. DATA STORE (20 Workers) ---
        let workers = [
            { id: 1, name: 'Suresh (Lead Mason)', email: 'suresh.m@example.com', contact: '9876543210', location: 'Ward 1, Center' },
            { id: 2, name: 'Mahesh (Electrician)', email: 'mahesh.e@example.com', contact: '8765432109', location: 'Ward 3, East' },
            { id: 3, name: 'Raju (Plumber)', email: 'raju.p@example.com', contact: '7654321098', location: 'Ward 2, West' },
            { id: 4, name: 'Ravi (Sanitation)', email: 'ravi.s@example.com', contact: '6543210987', location: 'Ward 4, South' },
            { id: 5, name: 'Venkatesh (Carpenter)', email: 'venky.c@example.com', contact: '9123456780', location: 'Ward 1, Market Area' },
            { id: 6, name: 'Krishna (General Helper)', email: 'krishna.h@example.com', contact: '9234567801', location: 'Ward 5, North Block' },
            { id: 7, name: 'Shiva (Lineman)', email: 'shiva.l@example.com', contact: '9345678012', location: 'Ward 3, Main Road' },
            { id: 8, name: 'Ramu (Sweeper)', email: 'ramu.s@example.com', contact: '9456780123', location: 'Ward 6, Village End' },
            { id: 9, name: 'Gopi (Driver / JCB)', email: 'gopi.d@example.com', contact: '9567801234', location: 'Ward 2, Panchayat Office' },
            { id: 10, name: 'Hari (Mason)', email: 'hari.m@example.com', contact: '9678012345', location: 'Ward 4, East Colony' },
            { id: 11, name: 'Prasad (Plumber)', email: 'prasad.p@example.com', contact: '9780123456', location: 'Ward 5, School Road' },
            { id: 12, name: 'Srinivas (Electrician)', email: 'srinu.e@example.com', contact: '9801234567', location: 'Ward 1, Temple Street' },
            { id: 13, name: 'Kiran (General Helper)', email: 'kiran.h@example.com', contact: '9012345678', location: 'Ward 6, New Colony' },
            { id: 14, name: 'Nithin (Sanitation)', email: 'nithin.s@example.com', contact: '9988776655', location: 'Ward 3, Bus Stand' },
            { id: 15, name: 'Ashok (Carpenter)', email: 'ashok.c@example.com', contact: '9877665544', location: 'Ward 2, Market Area' },
            { id: 16, name: 'Prakash (Lineman)', email: 'prakash.l@example.com', contact: '9766554433', location: 'Ward 4, Center' },
            { id: 17, name: 'Karthik (Sweeper)', email: 'karthik.s@example.com', contact: '9655443322', location: 'Ward 5, West' },
            { id: 18, name: 'Rajesh (Driver)', email: 'rajesh.d@example.com', contact: '9544332211', location: 'Ward 1, North Block' },
            { id: 19, name: 'Lokesh (Mason)', email: 'lokesh.m@example.com', contact: '9433221100', location: 'Ward 6, Main Road' },
            { id: 20, name: 'Naresh (Plumber)', email: 'naresh.p@example.com', contact: '9322110099', location: 'Ward 3, East Colony' }
        ];

        let workerIdCounter = 21;

        // --- 2. RENDER TABLE & SEARCH ---
        function renderWorkers(filterText = '') {
            const tbody = document.getElementById('workers-tbody');
            tbody.innerHTML = '';

            const filteredWorkers = workers.filter(worker =>
                worker.name.toLowerCase().includes(filterText.toLowerCase()) ||
                worker.email.toLowerCase().includes(filterText.toLowerCase()) ||
                worker.location.toLowerCase().includes(filterText.toLowerCase())
            );

            if (filteredWorkers.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 40px; color:#6b7280;">No workers found.</td></tr>`;
                return;
            }

            filteredWorkers.forEach(worker => {
                tbody.innerHTML += `
                <tr>
                    <td><strong>${worker.name}</strong></td>
                    <td>${worker.email}</td>
                    <td>${worker.contact}</td>
                    <td>${worker.location}</td>
                    <td class="action-btns">
                        <button class="btn btn-outline" style="color: #4f46e5; border-color: #4f46e5;" onclick="openUpdateModal(${worker.id})">Update</button>
                        <button class="btn btn-danger" onclick="deleteWorker(${worker.id})">Delete</button>
                    </td>
                </tr>
            `;
            });
        }

        function searchWorkers() {
            const searchText = document.getElementById('searchInput').value;
            renderWorkers(searchText);
        }

        // --- 3. MODAL CONTROLS ---
        function openAddModal() {
            document.getElementById('add-name').value = '';
            document.getElementById('add-email').value = '';
            document.getElementById('add-contact').value = '';
            document.getElementById('add-location').value = '';
            document.getElementById('addModal').classList.add('active');
        }

        function openUpdateModal(id) {
            const worker = workers.find(w => w.id === id);

            document.getElementById('update-id').value = worker.id;
            document.getElementById('update-name-display').innerText = worker.name;
            document.getElementById('update-email').value = worker.email;
            document.getElementById('update-contact').value = worker.contact;
            document.getElementById('update-location').value = worker.location;

            document.getElementById('updateModal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // --- 4. CRUD ACTIONS ---
        function saveNewWorker() {
            const name = document.getElementById('add-name').value.trim();
            const email = document.getElementById('add-email').value.trim();
            const contact = document.getElementById('add-contact').value.trim();
            const location = document.getElementById('add-location').value.trim();

            if (!name || !email || !contact) {
                alert("Please fill in at least the Name, Email, and Contact.");
                return;
            }

            workers.push({
                id: workerIdCounter++,
                name: name,
                email: email,
                contact: contact,
                location: location
            });

            closeModal('addModal');
            renderWorkers();
            alert('Worker added successfully!');
        }

        function saveUpdatedWorker() {
            const id = parseInt(document.getElementById('update-id').value);
            const email = document.getElementById('update-email').value.trim();
            const contact = document.getElementById('update-contact').value.trim();
            const location = document.getElementById('update-location').value.trim();

            const index = workers.findIndex(w => w.id === id);
            if (index !== -1) {
                workers[index].email = email;
                workers[index].contact = contact;
                workers[index].location = location;
            }

            closeModal('updateModal');
            renderWorkers();
            alert('Worker details updated successfully!');
        }

        function deleteWorker(id) {
            if (confirm("Are you sure you want to delete this worker? This action cannot be undone.")) {
                workers = workers.filter(w => w.id !== id);
                renderWorkers();
            }
        }

        // Initialize
        renderWorkers();

        fetch
        let Workers = [];

        // Fetch data from the Python backend when the page loads
        async function loadWorkers() {
            const response = await fetch('/api/workers'); // Calls your Python script
            workers = await response.json();              // Python returns the SQL data
            renderWorkers();                              // Draw the table
        }

        loadWorkers();

        async function saveNewWorker() {
            const name = document.getElementById('add-name').value.trim();
            const email = document.getElementById('add-email').value.trim();
            const contact = document.getElementById('add-contact').value.trim();
            const location = document.getElementById('add-location').value.trim();

            if (!name || !email || !contact) {
                alert("Please fill in at least the Name, Email, and Contact.");
                return;
            }

            // Send the new data to Python
            await fetch('/api/workers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, email: email, contact: contact, location: location })
            });

            closeModal('addModal');
            loadWorkers(); // Grab the fresh list from the database
            alert('Worker added successfully!');
        }

        async function saveUpdatedWorker() {
            const id = document.getElementById('update-id').value;
            const email = document.getElementById('update-email').value.trim();
            const contact = document.getElementById('update-contact').value.trim();
            const location = document.getElementById('update-location').value.trim();

            // Tell Python to update this specific ID
            await fetch(`/api/workers/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, contact: contact, location: location })
            });

            closeModal('updateModal');
            loadWorkers(); // Grab the fresh list from the database
            alert('Worker details updated successfully!');
        }

        async function deleteWorker(id) {
            if (confirm("Are you sure you want to delete this worker? This action cannot be undone.")) {

                // Tell Python to delete this specific ID
                await fetch(`/api/workers/${id}`, {
                    method: 'DELETE'
                });

                loadWorkers(); // Grab the fresh list from the database
            }
        }
    </script>

</body>

</html>
